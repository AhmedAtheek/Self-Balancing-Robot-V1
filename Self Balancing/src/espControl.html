<!DOCTYPE HTML>
<html>
<head>
  <title>Balance Bot Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Rubik; text-align: center; margin:0px auto; padding-top: 30px; }
    .button {
      padding: 20px 40px;
      font-size: 24px;
      margin: 5px;
      cursor: pointer;
      background-color: #4CAF50;
      border: none;
      border-radius: 5px;
      color: white;
    }
    #stop { background-color: #d4cdcd; }
    table { margin-left: auto; margin-right: auto; }
    #ip-input { margin: 20px; padding: 10px; font-size: 16px; }
    #connect-btn { padding: 10px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>BALANCING BOT</h1>
  
  <div>
    <input type="text" id="ip-input" placeholder="ESP32 IP Address" />
    <button id="connect-btn" onclick="saveIP()">Connect</button>
  </div>
  
  <table>
    <tr><td></td><td><button class="button" ontouchstart="sendCommand('forward')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('forward')" onmouseup="sendCommand('stop')">FORWARD</button></td><td></td></tr>
    <tr>
      <td><button class="button" ontouchstart="sendCommand('left')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('left')" onmouseup="sendCommand('stop')">LEFT</button></td>
      <td><button class="button" id="stop" onclick="sendCommand('stop')">STOP</button></td>
      <td><button class="button" ontouchstart="sendCommand('right')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('right')" onmouseup="sendCommand('stop')">RIGHT</button></td>
    </tr>
    <tr><td></td><td><button class="button" ontouchstart="sendCommand('backward')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('backward')" onmouseup="sendCommand('stop')">BACKWARD</button></td><td></td></tr>
  </table>


  
  <script>
    let espIP = localStorage.getItem('espIP') || '';
    document.getElementById('ip-input').value = espIP;
    
    function saveIP() {
      espIP = document.getElementById('ip-input').value;
      localStorage.setItem('espIP', espIP);
      alert('IP address saved: ' + espIP);
    }
    
    function sendCommand(command) {
      if (!espIP) {
        alert('Please enter the ESP32 IP address first!');
        return;
      }
      
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "http://" + espIP + "/command?cmd=" + command, true);
      xhr.onerror = function() {
        console.error("Error sending command to ESP32");
      };
      xhr.send();
    }
  </script>
</body>
</html>
